# Test Profile Configuration
spring.application.name=tutorly

# Server Configuration
server.port=0

# Test Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:tutorly_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration for Testing
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration for Testing
jwt.secret=test_secret_key_for_testing_only_minimum_256_bits_long_required_for_security
jwt.expiration=86400000

# CORS Configuration for Testing
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174

# Logging
logging.level.com.main.tutorly=DEBUG
logging.level.org.springframework.security=DEBUG

# Spring Profile
spring.profiles.active=test

# Disable actuator security for testing
management.security.enabled=false
