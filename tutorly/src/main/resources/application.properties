spring.application.name=tutorly

# Server Configuration
server.port=${PORT:8081}

# Database Configuration (Use environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tutorly}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (IMPORTANT: Set JWT_SECRET in production)
jwt.secret=${JWT_SECRET:tutorly_secret_key_2024_change_in_production_make_it_longer_and_more_secure}
jwt.expiration=86400000

# CORS Configuration (comma-separated list)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://192.168.1.65:5173}

# Logging
logging.level.com.main.tutorly=INFO
logging.level.org.springframework.security=DEBUG

# Spring Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
